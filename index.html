<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gabay Exam Bilingual — 特定技能介護 / Care Work Exam</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --amber:#EF9F27;--amber-light:#FAEEDA;--amber-dark:#854F0B;
      --teal:#1D9E75;--teal-light:#E1F5EE;
      --coral:#D85A30;--coral-light:#FAECE7;
      --gray:#888780;--ink:#1a1a18;
      --paper:#F9F8F4;--surface:#F2F1EB;
      --border:rgba(26,26,24,0.1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Sora',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding-bottom:60px;}
    .header{background:var(--ink);padding:20px;text-align:center;position:relative;}
    .header-logo{font-family:'Noto Serif JP',serif;font-size:22px;color:white;letter-spacing:.05em;}
    .header-logo em{color:var(--amber);font-style:normal;}
    .main{max-width:480px;margin:0 auto;padding:16px;}
    .q-card{background:white;border:0.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;}
    .q-situation{font-size:16px;font-weight:500;line-height:1.6;margin-bottom:10px;}
    .q-tagalog{font-size:14px;color:var(--teal);background:var(--teal-light);padding:10px;border-radius:8px;font-style:italic;}
    .option-btn{width:100%;text-align:left;padding:14px;border-radius:12px;border:1.5px solid var(--border);background:white;cursor:pointer;margin-bottom:8px;transition:0.2s;}
    .option-btn.correct{border-color:var(--teal);background:var(--teal-light);}
    .option-btn.wrong{border-color:var(--coral);background:var(--coral-light);}
    .feedback-box{display:none;margin-top:14px;padding:16px;border-radius:12px;font-size:14px;line-height:1.6;border:0.5px solid var(--border);}
    .feedback-box.correct{background:var(--teal-light);color:#0a5c40;}
    .feedback-box.wrong{background:var(--coral-light);color:#7a2010;}
    .next-btn{width:100%;background:var(--amber);color:white;border:none;padding:16px;border-radius:12px;font-weight:600;cursor:pointer;margin-top:10px;}
    .results-screen{display:none;text-align:center;padding:20px;}
    input[type=text]{width:100%;padding:14px;border-radius:10px;border:1.5px solid var(--border);margin-bottom:10px;}
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo"><em>Gabay</em> Exam <span>Bilingual</span></div>
</div>

<div class="main">
  <div id="quiz-area">
    <div class="q-card" id="q-card">
      <div id="q-num" style="color:var(--amber); font-size:12px; margin-bottom:8px;"></div>
      <p class="q-situation" id="q-jp"></p>
      <div class="q-tagalog" id="q-tl"></div>
    </div>
    <div id="options-wrap"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <button class="next-btn" id="next-btn" style="display:none;" onclick="nextQuestion()">次の問題へ / Next →</button>
  </div>

  <div class="results-screen" id="results-screen">
    <h2>Result: <span id="final-score"></span> / 20</h2>
    <div style="background:white; padding:20px; border-radius:16px; margin-top:20px; border:0.5px solid var(--border);">
      <p style="font-size:12px; color:var(--gray); margin-bottom:10px;">名前を入力して監督へ報告してください</p>
      <input type="text" id="user-name" placeholder="Name / 受験者名">
      <button class="next-btn" id="send-btn" onclick="sendToSheet()">監督へ送る / Send to Director</button>
    </div>
  </div>
</div>

<script>
  // 黄金のルートURL
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwEPJnzMqWbDavvD0oRdlGfI9GsgKjj5BZLqIbOBXWpOV2tbco-a6kDjM5vkYC8kcioLA/exec";

  const questions = [
    { jp:"利用者が食事中に突然むせ込んでいる", tl:"Bigla na lang nag-ubo ang pasyente habang kumakain", opts:["すぐに水を飲ませる","背中を叩いて様子を見る","前傾姿勢をとらせ、咳を促す"], c:2, fb:"前傾姿勢が誤嚥物の排出を助けます。水を飲ませるのは危険です。/ Forward tilt helps expel items." },
    { jp:"認知症の利用者が食事を拒否している", tl:"Tumatanggi kumain ang pasyenteng may demensya", opts:["無理に口に運ぶ","好きな食べ物の話をしながら雰囲気を整える","食事をすぐに下げて記録する"], c:1, fb:"無理強いせず、本人の気持ちに寄り添うことが大切です。/ Empathy is key for dementia care." },
    { jp:"嚥下障害のある利用者に水を提供する際の対応は？", tl:"Paano mag-aalok ng tubig sa pasyenteng may hirap sa paglunok?", opts:["普通の水をコップで出す","とろみをつけた水を少量ずつ出す","水分は禁止にする"], c:1, fb:"嚥下障害にはとろみ（増粘剤）が必要です。/ Thickened liquids prevent aspiration." },
    { jp:"おむつ交換時に褥瘡（床ずれ）を発見した", tl:"Nakakita ng simula ng bedsore habang nagpapalit ng diaper", opts:["様子を見て翌日報告する","その場で記録し、上長にすぐ報告する","自分でクリームを塗る"], c:1, fb:"早期発見・早期報告が鉄則です。/ Early detection and reporting is mandatory." },
    { jp:"排泄介助時、プライバシーを守る適切な方法は？", tl:"Paano mapananatili ang privacy ng pasyente?", opts:["カーテンを開けたまま行う","ドアとカーテンを閉め、最小限の介助にする","2人で行う"], c:1, fb:"ドアとカーテンを閉めるのは尊厳を守る基本です。/ Closing doors/curtains protects dignity." },
    { jp:"車椅子への移乗介助で最初に確認すべきことは？", tl:"Ano ang unang dapat suriin bago ilipat ang pasyente?", opts:["ブレーキをかけ、フットレストを上げる","素早く持ち上げる","スタッフを呼ぶ"], c:0, fb:"ブレーキ確認が安全の第一歩です。/ Brake check is the first step for safety." },
    { jp:"歩行介助中に利用者がふらつき、転倒しそうになった", tl:"Halos mahulog ang pasyente habang naglalakad", opts:["腕を強く引っ張る","体を支えながらゆっくり床に降ろす","離れる"], c:1, fb:"無理に止めず、安全に降ろすことで怪我を防ぎます。/ Guide them safely to the floor." },
    { jp:"認知症の人が「家に帰りたい」と繰り返している", tl:"Paulit-ulit na nagsasabing 'umuwi' ang pasyente", opts:["強く否定する","感情に寄り添い、別の活動に誘う","無視する"], c:1, fb:"否定せず、感情を受容（バリデーション）します。/ Validate their feelings, don't deny." },
    { jp:"認知症の人が同じ質問を何度も繰り返す", tl:"Paulit-ulit na nagtatanong ang pasyente", opts:["「さっき聞きました」と言う","毎回初めてのように丁寧に答える","移動させる"], c:1, fb:"本人には毎回が初めての不安です。丁寧に答えます。/ Answer patiently each time." },
    { jp:"利用者が意識を失い、反応がない", tl:"Nawalan ng malay ang pasyente", opts:["一人でCPRを開始する","助けを呼び、AEDを依頼する","家族に連絡する"], c:1, fb:"まず応援を呼び、チームで対応します。/ Call for help and request an AED." },
    { jp:"利用者が頭を打ったが、傷はない", tl:"Natamaan ang ulo pero walang sugat", opts:["様子を見る","すぐに看護師に報告しバイタルを測る","大丈夫か聞くだけ"], c:1, fb:"脳内出血の恐れがあるため、必ず報告します。/ Internal bleeding risk; report immediately." },
    { jp:"ノロウイルス患者の嘔吐物を処理する際は？", tl:"Paglilinis ng suka ng may norovirus", opts:["素手で拭く","手袋・マスクをし次亜塩素酸で消毒","しばらく待つ"], c:1, fb:"次亜塩素酸ナトリウムでの消毒が必須です。/ Use sodium hypochlorite for disinfection." },
    { jp:"正しい手洗いのタイミングは？", tl:"Tamang oras ng paghuhugas ng kamay", opts:["朝と晩だけ","ケアの前後、利用者に触れる前後","汚れた時だけ"], c:1, fb:"ケアの前後の手洗いが感染を防ぎます。/ Wash hands before and after care." },
    { jp:"利用者が「死にたい」とつぶやいた", tl:"Bumulong ang pasyente na 'gusto nang mamatay'", opts:["否定する","気をそらす","真剣に受け止め、上長に報告する"], c:2, fb:"命のサインです。傾聴し、必ず共有します。/ Listen seriously and report to supervisors." },
    { jp:"耳の聞こえにくい利用者への対応は？", tl:"Paano makipag-usap sa mahina ang pandinig?", opts:["大声で叫ぶ","正面から向き合い、口元を見せて話す","家族に頼む"], c:1, fb:"口の形を見せ、筆談も活用します。/ Face them so they can read your lips." },
    { jp:"介護記録を書く際の正しい姿勢は？", tl:"Tamang pagsulat ng rekord", opts:["後でまとめて書く","事実を客観的に、早く書く","主観で書く"], c:1, fb:"事実はその場に近い時間で、客観的に記します。/ Record facts objectively and promptly." },
    { jp:"利用者の食欲低下を見つけた場合", tl:"Pagbaba ng gana kumain ng pasyente", opts:["市販薬を出す","明日のスタッフに言う","看護師に報告しバイタルを測る"], c:2, fb:"小さな変化も病気の兆候かもしれません。報告します。/ Report even small changes in condition." },
    { jp:"ナースコールを何度も押す利用者への対応", tl:"Pasyenteng laging pumipindot ng nurse call", opts:["怒る","ナースコールを遠ざける","「すぐ伺います」と寄り添う"], c:2, fb:"不安の現れかもしれません。拒絶は虐待です。/ Respond with empathy; rejection is abuse." },
    { jp:"同僚が乱暴な言葉を使っているのを見た", tl:"Nakita mong marahas ang salita ng kasamahan", opts:["無視する","その場で止め、上長に報告する","家族に言う"], c:1, fb:"虐待の発見は通報義務があります。/ Reporting abuse is a legal duty." },
    { jp:"「安全のため」にベッドに縛るよう言われた", tl:"Inutusang itali ang pasyente para sa kaligtasan", opts:["従う","原則禁止を伝え、別の方法を考える","怪我がなければOK"], c:1, fb:"身体拘束は原則禁止。代わりのケアを模索します。/ Restraint is prohibited; find alternatives." }
  ];

  let currentIdx = 0;
  let score = 0;

  function renderQ() {
    const q = questions[currentIdx];
    document.getElementById('q-num').textContent = `Q ${currentIdx + 1} / 20`;
    document.getElementById('q-jp').textContent = q.jp;
    document.getElementById('q-tl').textContent = "🇵🇭 " + q.tl;
    const wrap = document.getElementById('options-wrap');
    wrap.innerHTML = q.opts.map((o, i) => `<button class="option-btn" onclick="check(${i})">${o}</button>`).join('');
    document.getElementById('feedback-box').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
  }

  function check(i) {
    const q = questions[currentIdx];
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    const fb = document.getElementById('feedback-box');
    fb.style.display = 'block';
    fb.textContent = q.fb;
    if(i === q.c) {
      btns[i].classList.add('correct');
      fb.className = 'feedback-box correct';
      score++;
    } else {
      btns[i].classList.add('wrong');
      btns[q.c].classList.add('correct');
      fb.className = 'feedback-box wrong';
    }
    document.getElementById('next-btn').style.display = 'block';
  }

  function nextQuestion() {
    currentIdx++;
    if(currentIdx < 20) renderQ();
    else {
      document.getElementById('quiz-area').style.display = 'none';
      document.getElementById('results-screen').style.display = 'block';
      document.getElementById('final-score').textContent = score;
    }
  }

  function sendToSheet() {
    const name = document.getElementById('user-name').value;
    if(!name) return alert("Enter your name!");
    const btn = document.getElementById('send-btn');
    btn.textContent = "Sending..."; btn.disabled = true;
    fetch(WEB_APP_URL, {
      method: "POST", mode: "no-cors",
      body: JSON.stringify({ name: name, score: score, report: `Result: ${score}/20 by ${name}` })
    }).then(() => {
      document.getElementById('results-screen').style.display = 'none';
      alert("Sent Successfully!");
      location.reload();
    });
  }
  renderQ();
</script>
</body>
</html>
